name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk rice-launcher-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: rice-launcher-debug
          path: rice-launcher-debug.apk

      # Direct-download link for phones: push the APK to an orphan 'apk' branch,
      # served at https://github.com/<repo>/raw/apk/rice-launcher-debug.apk
      - name: Publish APK to apk branch
        run: |
          mkdir /tmp/apkpub && cd /tmp/apkpub
          git init -q -b apk
          cp "$GITHUB_WORKSPACE/rice-launcher-debug.apk" .
          git add rice-launcher-debug.apk
          git -c user.name=github-actions -c user.email=actions@users.noreply.github.com \
              commit -q -m "debug build ${GITHUB_SHA::7}"
          git push --force \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}" apk

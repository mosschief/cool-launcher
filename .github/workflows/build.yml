name: build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk rice-launcher-debug.apk

      - uses: actions/upload-artifact@v4
        with:
          name: rice-launcher-debug
          path: rice-launcher-debug.apk

      - name: Attach APK to rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest debug build
          prerelease: true
          files: rice-launcher-debug.apk
